also, here are some things on the UI/UX and feel, feel free to discuss them with me before making any changes:
To move away from the "basic website" look and toward a "professional tool" look:
* Color Palette: Use a more sophisticated palette. Instead of bright "pure" red and green, try a "War Room" palette:
   * Background: Deep Navy or Charcoal.
   * Hits: High-saturation Orange or Crimson.
   * Intercepts: Cyan or Electric Blue (instead of green, which can look a bit "stoplight-ish").
* Typography: Use a clean, modern sans-serif (like Inter, Roboto Mono, or JetBrains Mono) to give it a technical, precise feel.
* Glassmorphism/Depth: Use slight transparency and blur (backdrop-filter) on your sidebars and menus so the map is visible underneath them. This creates a sense of depth and modern software design.
* Path Styling: Instead of solid lines, use arcs with gradients. A line that fades from a light color at the source to a solid color at the destination creates a sense of direction and motion.
* Temporal Fading: Dim older strikes and make the most recent ones (last 24-48 hours) glow or pulse. This helps the user immediately see what is "new."
* Path Clustering: When zoomed out, don't show every individual line. Cluster them into thick "corridors" that show the general flow of attacks, then reveal individual lines as the user zooms in.
* Map Style: Switch to a custom "dark mode" or "minimalist light" map (using a service like Mapbox or Stadia Maps). The current map has too much background noise (labels, roads) that competes with your data.

