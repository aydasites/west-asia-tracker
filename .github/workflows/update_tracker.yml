Examined RSS feed mechanics and bot detection bypass methods
Examined RSS feed mechanics and bot detection bypass methods
Honest answer — we're not bypassing anything, but it's worth understanding the two different systems at play.

The Python auto-updater (update_events.py) — runs server-side on GitHub Actions:

This uses feedparser, which is a standard RSS client. RSS feeds are designed for machine consumption — that's literally what RSS exists for. When Al Jazeera publishes aljazeera.com/xml/rss/all.xml, they're explicitly inviting automated readers. Same for Reuters, BBC, etc. We're making 17 HTTP requests every 12 hours — that's negligible traffic. No bot detection is triggered because we're using the feed as intended.

However, there are real risks:


Examined bot-detection bypass mechanisms across multiple sources
Examined bot-detection bypass mechanisms across multiple sources
Two things to flag:

1. Python updater — fake User-Agent: Line 245 sends User-Agent: Mozilla/5.0 Chrome/120... — it's pretending to be a browser. Most RSS endpoints don't care, but this is technically masquerading. The cleaner approach is to identify ourselves honestly. Some feeds (especially CENTCOM's .mil site) may reject requests without a browser-like UA, but most RSS endpoints don't check.

2. Client-side news ticker — allorigins.win CORS proxy: The live news ticker in the browser uses api.allorigins.win to bypass CORS restrictions. This is a free third-party proxy — it works but it's unreliable (goes down sometimes), and it means your users' browsers are routing requests through someone else's server. This is the weakest part of the whole system.

Let me fix both to be more honest and robust:


Weighing honest disclosure against potential feed blocking
Weighing honest disclosure against potential feed blocking
Now let me give you the full honest picture:


Deliberated on clarifying legitimacy of methods employed
Deliberated on clarifying legitimacy of methods employed
Here's the straightforward breakdown:

RSS feeds (the Python updater) — totally legitimate: RSS is designed for automated consumption. When Al Jazeera hosts /xml/rss/all.xml, they're explicitly publishing a machine-readable feed. We're making 17 requests every 12 hours — less traffic than a single person opening 17 browser tabs. I've now changed the User-Agent to honestly identify us as WestAsiaStrikeTracker/1.0 instead of pretending to be Chrome. If any feed doesn't like that and blocks us, the script already has try/except and just skips that feed — the rest still work. No scraping, no bypassing, no deception.

The one weak point — the client-side news ticker: The live news ticker in the browser uses allorigins.win, a free CORS proxy. This exists because browsers block cross-origin RSS fetching for security reasons. The proxy routes requests through their server so the browser can read the feed. This is:

Common practice for client-side RSS readers
Not bypassing trust scoring (the proxy just fetches the public RSS URL)
But unreliable — allorigins.win sometimes goes down, is slow, or rate-limits
And you're trusting a third party with your users' requests
What CENTCOM specifically does: Their .mil site doesn't have a standard RSS feed URL — we're using a DNN module endpoint (/DesktopModules/ArticleCS/RSS.ashx). This sometimes works, sometimes doesn't. It's their CMS generating the feed, not a hand-curated endpoint. If it fails, the script just skips it and relies on the 16 other feeds to catch CENTCOM-reported events through Reuters/AP/BBC coverage.

Bottom line: Nothing we're doing is bypassing bot protection. We're reading public RSS feeds at a very low frequency. The only thing I'd watch is whether the CENTCOM and Iran International feeds consistently return data — you can check this by going to Actions in your repo and reading the log output after a run.


